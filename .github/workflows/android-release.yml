name: 📱 Build & Release APK

on:
  push:
    branches: [mobile]
    tags: ["v*"]
  workflow_dispatch:

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: 🟢 Setup Node.js 25
        uses: actions/setup-node@v4
        with:
          node-version: "25"
          cache: "npm"

      - name: 📦 Install dependencies
        run: npm ci

      - name: 🏗️ Build React & Sync Capacitor
        run: |
          npm run build
          npx cap sync android

      - name: ☕ Setup Java 21
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "21"

      - name: 🔑 Decode Keystore (Python fallback for stability)
        env:
          KEYSTORE_B64: ${{ secrets.KEYSTORE_BASE64 }}
        run: |
          python3 -c "
          import base64, os
          b64 = os.environ['KEYSTORE_B64'].replace(' ', '').replace('\n', '').replace('\r', '')
          with open('android/app/android-key.jks', 'wb') as f:
              f.write(base64.b64decode(b64))
          "
          if [ ! -s android/app/android-key.jks ]; then
            echo "::error::Keystore is empty or invalid. Check KEYSTORE_BASE64 secret."
            exit 1
          fi
          echo "✅ Keystore decoded ($(stat -c%s android/app/android-key.jks) bytes)"

      - name: 🔑 Grant Gradlew Permissions
        run: chmod +x ./android/gradlew

      - name: 🔧 Fix Gradle Paths (CI safety)
        run: |
          sed -i 's/\\.\\\\node_modules/..\/node_modules/g' android/settings.gradle 2>/dev/null || true
          sed -i "s|'.\\\\|'../|g" android/settings.gradle 2>/dev/null || true

      - name: 🔨 Build Signed APK
        run: cd android && ./gradlew assembleRelease

      - name: 📍 Find APK
        id: find_apk
        run: |
          APK_PATH=$(find android/app/build/outputs/apk/release -name "*.apk" -type f | head -n 1)
          if [ -z "$APK_PATH" ]; then
            echo "::error::APK not found!"
            exit 1
          fi
          echo "apk_path=$APK_PATH" >> $GITHUB_OUTPUT

      - name: 🚀 Upload to GitHub Releases
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ steps.find_apk.outputs.apk_path }}
          tag_name: ${{ github.ref_name }}
          name: Release ${{ github.ref_name }}
          draft: false
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
